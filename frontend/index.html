<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F97316">
    <meta name="description" content="灵感食仓 - AI驱动的智能食物管理助手">
    
    <title>灵感食仓✨</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍊</text></svg>">
    
    <!-- Google Fonts - Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="js/lucide.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#FFF7ED',
                            100: '#FFEDD5',
                            200: '#FED7AA',
                            300: '#FDBA74',
                            400: '#FB923C',
                            500: '#F97316',
                            600: '#EA580C',
                            700: '#C2410C',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-neutral-50 text-neutral-800 antialiased">
    <!-- 应用容器 -->
    <div id="app" class="min-h-screen">

        <!-- 加载动画 -->
        <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-orange-50 to-amber-50">
            <div class="text-center">
                <div class="w-24 h-24 mx-auto mb-6 relative">
                    <div class="absolute inset-0 bg-gradient-to-tr from-orange-400 to-amber-500 rounded-3xl rotate-6 animate-pulse"></div>
                    <div class="absolute inset-0 bg-white rounded-3xl flex items-center justify-center shadow-xl">
                        <span class="text-5xl">🍊</span>
                    </div>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">灵感食仓</h1>
                <p class="text-gray-500">正在加载...</p>
            </div>
        </div>

        <!-- 侧边栏（桌面端） -->
        <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white border-r border-gray-200 z-40 flex-col hidden md:!flex">
            <!-- Logo区域 -->
            <div class="p-6 border-b border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-amber-500 rounded-xl flex items-center justify-center">
                        <span class="text-xl">🍊</span>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg text-gray-800">灵感食仓</h1>
                        <p class="text-xs text-gray-400">InspiLarder</p>
                    </div>
                </div>
            </div>

            <!-- 导航菜单 -->
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <button class="sidebar-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-orange-500 bg-orange-50 transition-all" data-page="home">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="font-medium">首页</span>
                </button>
                <button class="sidebar-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all" data-page="spaces">
                    <i data-lucide="box" class="w-5 h-5"></i>
                    <span class="font-medium">储存空间</span>
                </button>
                <button class="sidebar-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all" data-page="inspiration">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    <span class="font-medium">灵机一动</span>
                </button>
                <button class="sidebar-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all" data-page="recipes">
                    <i data-lucide="chef-hat" class="w-5 h-5"></i>
                    <span class="font-medium">我的菜谱</span>
                </button>
                <button class="sidebar-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all" data-page="profile">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span class="font-medium">个人中心</span>
                </button>
            </nav>

            <!-- 底部用户信息 -->
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center gap-3">
                    <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-orange-300 to-amber-400 flex items-center justify-center text-white font-bold">
                        用
                    </div>
                    <div class="flex-1 min-w-0">
                        <p id="user-name" class="font-medium text-sm text-gray-800 truncate">未登录</p>
                        <p id="user-role" class="text-xs text-gray-400">用户</p>
                    </div>
                    <button id="logout-btn" class="p-2 text-gray-400 hover:text-red-500 transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main id="main-content" class="min-h-screen pb-20 md:pb-0 md:ml-64 transition-all">
            <!-- 页面内容将通过JS动态加载 -->
        </main>

        <!-- 底部导航栏（移动端） -->
        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 md:hidden z-40 safe-area-pb">
            <div class="flex justify-around items-center h-16">
                <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-orange-500" data-page="home">
                    <i data-lucide="home" class="w-6 h-6 mb-1"></i>
                    <span class="text-xs">首页</span>
                </button>
                <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400" data-page="spaces">
                    <i data-lucide="box" class="w-6 h-6 mb-1"></i>
                    <span class="text-xs">空间</span>
                </button>
                <button id="add-btn" class="flex flex-col items-center justify-center -mt-6">
                    <div class="w-14 h-14 bg-gradient-to-r from-orange-400 to-amber-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-200">
                        <i data-lucide="plus" class="w-7 h-7 text-white"></i>
                    </div>
                </button>
                <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400" data-page="inspiration">
                    <i data-lucide="sparkles" class="w-6 h-6 mb-1"></i>
                    <span class="text-xs">灵感</span>
                </button>
                <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400" data-page="profile">
                    <i data-lucide="user" class="w-6 h-6 mb-1"></i>
                    <span class="text-xs">我的</span>
                </button>
            </div>
        </nav>

        <!-- AI录入浮动按钮（桌面端） -->
        <button id="desktop-add-btn" class="hidden md:flex fixed right-8 bottom-8 w-16 h-16 bg-gradient-to-r from-orange-400 to-amber-500 rounded-full items-center justify-center shadow-xl shadow-orange-200 hover:shadow-2xl hover:scale-105 transition-all z-40">
            <i data-lucide="plus" class="w-8 h-8 text-white"></i>
        </button>

        <!-- AI录入模态框 -->
        <div id="ai-modal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity" id="ai-modal-backdrop"></div>
            <div class="absolute inset-x-4 top-[5%] md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[600px] bg-white rounded-3xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0 flex flex-col max-h-[90vh]" id="ai-modal-content">
                <!-- 头部 -->
                <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-orange-50 to-amber-50 flex-shrink-0">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-amber-500 rounded-xl flex items-center justify-center">
                            <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800">AI 智能录入</h3>
                            <p class="text-xs text-gray-500">拍照或上传，AI自动识别</p>
                        </div>
                    </div>
                    <button id="close-ai-modal" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- 内容区 -->
                <div class="p-6 overflow-y-auto">
                    <!-- 输入方式选择 -->
                    <div class="grid grid-cols-4 gap-3 mb-6">
                        <button class="input-method-btn flex flex-col items-center gap-2 p-3 rounded-2xl border-2 border-orange-200 bg-orange-50 text-orange-600 transition-all" data-method="camera">
                            <i data-lucide="camera" class="w-5 h-5"></i>
                            <span class="text-xs font-medium">拍照</span>
                        </button>
                        <button class="input-method-btn flex flex-col items-center gap-2 p-3 rounded-2xl border-2 border-gray-200 text-gray-600 hover:border-orange-200 hover:bg-orange-50 hover:text-orange-600 transition-all" data-method="upload">
                            <i data-lucide="image-plus" class="w-5 h-5"></i>
                            <span class="text-xs font-medium">上传</span>
                        </button>
                        <button class="input-method-btn flex flex-col items-center gap-2 p-3 rounded-2xl border-2 border-gray-200 text-gray-600 hover:border-orange-200 hover:bg-orange-50 hover:text-orange-600 transition-all" data-method="voice">
                            <i data-lucide="mic" class="w-5 h-5"></i>
                            <span class="text-xs font-medium">语音</span>
                        </button>
                        <button class="input-method-btn flex flex-col items-center gap-2 p-3 rounded-2xl border-2 border-gray-200 text-gray-600 hover:border-orange-200 hover:bg-orange-50 hover:text-orange-600 transition-all" data-method="manual">
                            <i data-lucide="edit-3" class="w-5 h-5"></i>
                            <span class="text-xs font-medium">手动</span>
                        </button>
                    </div>

                    <!-- 手动输入表单 (已移除，使用新弹窗) -->

                    <!-- 图片预览区 -->
                    <div id="image-preview-area" class="mb-6">
                        <div id="upload-zone" class="border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-orange-400 hover:bg-orange-50 transition-all cursor-pointer">
                            <input type="file" id="image-input" accept="image/*" class="hidden" capture="environment">
                            <div class="w-16 h-16 mx-auto mb-4 bg-orange-100 rounded-2xl flex items-center justify-center">
                                <i data-lucide="upload-cloud" class="w-8 h-8 text-orange-500"></i>
                            </div>
                            <p class="text-gray-600 font-medium mb-1">点击或拖拽上传图片</p>
                            <p class="text-gray-400 text-sm">支持 JPG、PNG，最大 10MB</p>
                        </div>
                        
                        <!-- 图片预览 -->
                        <div id="preview-container" class="hidden relative">
                            <img id="preview-image" src="" alt="预览" class="w-full h-64 object-cover rounded-2xl">
                            <button id="remove-image" class="absolute top-2 right-2 w-8 h-8 bg-black/50 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- AI识别按钮 -->
                    <button id="ai-recognize-btn" class="w-full py-4 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-2xl font-semibold text-lg shadow-lg shadow-orange-200 hover:shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                        <span>开始 AI 识别</span>
                    </button>

                    <!-- AI识别结果编辑区 -->
                    <div id="ai-result-edit" class="hidden mt-6 space-y-4">
                        <div class="flex items-center gap-2 mb-4 bg-green-50 p-3 rounded-xl border border-green-100">
                            <div class="w-6 h-6 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                                <i data-lucide="check" class="w-3 h-3 text-green-600"></i>
                            </div>
                            <span class="font-medium text-green-700 text-sm">AI识别完成，请确认信息</span>
                        </div>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span class="mr-1">🏷️</span> 品名
                                </label>
                                <input type="text" id="edit-name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all bg-gray-50/50">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span class="mr-1">📱</span> 图标
                                </label>
                                <div class="flex gap-2 items-center">
                                    <input type="text" id="edit-icon" class="w-16 h-12 px-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all text-center text-2xl flex-shrink-0" value="📦" readonly>
                                    <button type="button" id="edit-icon-btn" class="flex-1 px-3 py-2 bg-orange-50 text-orange-600 rounded-xl border border-orange-200 hover:bg-orange-100 transition-colors text-sm font-medium">
                                        选择图标
                                    </button>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span class="mr-1">📂</span> 类别
                                </label>
                                <select id="edit-category" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all appearance-none bg-white">
                                    <option value="vegetable">🥬 新鲜蔬菜</option>
                                    <option value="fruit">🍎 时令水果</option>
                                    <option value="meat">🥩 生鲜肉类</option>
                                    <option value="seafood">🐟 海鲜水产</option>
                                    <option value="dairy">🥚 蛋奶制品</option>
                                    <option value="condiment">🧂 调味品</option>
                                    <option value="grain">🍚 米面粮油</option>
                                    <option value="snack">🍿 零食饮料</option>
                                    <option value="frozen">🧊 冷冻食品</option>
                                    <option value="other">📦 其他</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span class="mr-1">📍</span> 存放位置
                                </label>
                                <select id="edit-location" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all appearance-none bg-white">
                                    <option value="">选择位置</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span class="mr-1">⚖️</span> 数量
                                </label>
                                <div class="flex">
                                    <input type="number" id="edit-quantity" step="0.1" class="flex-1 px-4 py-3 border border-gray-300 rounded-l-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all border-r-0">
                                    <select id="edit-unit" class="px-3 py-3 border border-gray-300 rounded-r-xl bg-gray-50 text-sm focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all border-l-0">
                                        <option value="个">个</option>
                                        <option value="克">克</option>
                                        <option value="千克">千克</option>
                                        <option value="毫升">毫升</option>
                                        <option value="升">升</option>
                                        <option value="包">包</option>
                                        <option value="盒">盒</option>
                                        <option value="瓶">瓶</option>
                                        <option value="斤">斤</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span class="mr-1">📅</span> 保质期至
                                </label>
                                <input type="date" id="edit-expiry" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
                            </div>
                            
                            <div class="flex items-center gap-4 py-2">
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" id="edit-opened" class="w-5 h-5 rounded border-gray-300 text-orange-500 focus:ring-orange-500 transition-all">
                                    <span class="text-sm text-gray-700 group-hover:text-orange-600 transition-colors">已开封</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" id="edit-alert" checked class="w-5 h-5 rounded border-gray-300 text-orange-500 focus:ring-orange-500 transition-all">
                                    <span class="text-sm text-gray-700 group-hover:text-orange-600 transition-colors">临期提醒</span>
                                </label>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <span class="mr-1">📝</span> 备注
                                </label>
                                <textarea id="edit-notes" rows="2" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all resize-none bg-gray-50/50" placeholder="添加备注..."></textarea>
                            </div>
                        </div>
                        
                        <div class="flex gap-3 mt-6 pt-4 border-t border-gray-100">
                            <button id="cancel-edit" class="flex-1 py-3 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-all">
                                取消
                            </button>
                            <button id="confirm-save" class="flex-1 py-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-medium shadow-lg shadow-orange-200 hover:shadow-xl hover:scale-[1.02] transition-all">
                                确认保存
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="edit-modal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity" id="edit-modal-backdrop"></div>
            <div class="absolute inset-x-4 top-[10%] md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[500px] bg-white rounded-3xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0" id="edit-modal-content">
                <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-orange-50 to-amber-50">
                    <div class="flex items-center gap-3">
                        <div id="edit-modal-icon-bg" class="w-10 h-10 bg-gradient-to-br from-orange-400 to-amber-500 rounded-xl flex items-center justify-center">
                            <span id="edit-modal-icon" class="text-xl">✏️</span>
                        </div>
                        <div>
                            <h3 id="edit-modal-title" class="font-bold text-gray-800">编辑</h3>
                        </div>
                    </div>
                    <button id="close-edit-modal" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-6 space-y-4 max-h-[60vh] overflow-y-auto" id="edit-modal-form">
                    
                </div>
                <div class="p-6 border-t border-gray-100 flex gap-3 bg-gray-50">
                    <button id="edit-modal-cancel" class="flex-1 py-3 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-all">取消</button>
                    <button id="edit-modal-save" class="flex-1 py-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-medium shadow-lg shadow-orange-200 hover:shadow-xl transition-all">保存</button>
                </div>
            </div>
        </div>

        <!-- 存储空间创建/编辑模态框 -->
        <div id="location-modal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="location-modal-backdrop"></div>
            <div class="absolute inset-x-4 top-[10%] md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[420px] bg-white rounded-3xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0" id="location-modal-content">
                <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-orange-50 to-amber-50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-amber-500 rounded-xl flex items-center justify-center">
                            <span id="location-modal-header-icon" class="text-xl">📦</span>
                        </div>
                        <div>
                            <h3 id="location-modal-title" class="font-bold text-gray-800">创建空间</h3>
                        </div>
                    </div>
                    <button id="close-location-modal" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">图标</label>
                        <div class="flex gap-2">
                            <input type="text" id="location-icon" class="w-16 px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all text-center text-xl" value="📦" readonly>
                            <button type="button" id="location-select-icon-btn" class="px-4 py-2 bg-orange-50 text-orange-600 rounded-xl border border-orange-200 hover:bg-orange-100 transition-colors text-sm font-medium">
                                选择图标
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">空间名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="location-name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all" placeholder="如：冰箱、储藏室">
                    </div>
                    <input type="hidden" id="location-parent-id" value="">
                    <input type="hidden" id="location-id" value="">
                </div>
                <div class="p-6 border-t border-gray-100 flex gap-3 bg-gray-50">
                    <button id="location-modal-cancel" class="flex-1 py-3 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-all">取消</button>
                    <button id="location-modal-save" class="flex-1 py-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-medium shadow-lg shadow-orange-200 hover:shadow-xl transition-all">保存</button>
                </div>
            </div>
        </div>

        <!-- Toast 通知容器 -->
        <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-full max-w-sm px-4 pointer-events-none flex flex-col items-center space-y-2 md:top-6 safe-area-pt"></div>

        <!-- 确认对话框 -->
        <div id="confirm-dialog" class="fixed inset-0 z-[9999] hidden flex items-center justify-center p-4 animate-fadeIn">
            <div id="confirm-backdrop" class="fixed inset-0 bg-black/50 backdrop-blur-sm"></div>
            <div id="confirm-modal-content" class="bg-white rounded-3xl p-8 max-w-sm w-full relative z-10 text-center shadow-xl transform transition-all duration-200 ease-out scale-95 opacity-0">
                <div class="text-center mb-6">
                    <div id="confirm-icon" class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center">
                        <!-- 动态插入图标 -->
                    </div>
                    <h3 id="confirm-title" class="text-xl font-bold text-gray-800 mb-2">确认操作</h3>
                    <div id="confirm-message" class="text-gray-500 text-left">您确定要执行此操作吗？</div>
                </div>
                <div class="flex gap-3" id="confirm-buttons">
                    <button id="confirm-cancel" class="flex-1 py-3 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-all">
                        取消
                    </button>
                    <button id="confirm-ok" class="flex-1 py-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-medium shadow-lg shadow-orange-200 hover:shadow-xl transition-all">
                        确认
                    </button>
                </div>
            </div>
        </div>

        <!-- 输入对话框（替代原生prompt） -->
        <div id="input-dialog" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-md bg-white rounded-3xl p-6 shadow-2xl border border-orange-100">
                <div class="text-center mb-6">
                    <div id="input-icon" class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center bg-orange-100 text-orange-500 text-2xl">
                        📝
                    </div>
                    <h3 id="input-title" class="text-xl font-bold text-gray-800 mb-2">请输入</h3>
                    <p id="input-message" class="text-gray-500 mb-4">请填写以下信息</p>
                    <input type="text" id="input-field" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent text-center text-lg" placeholder="">
                </div>
                <div class="flex gap-3">
                    <button id="input-cancel" class="flex-1 py-3 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-all">
                        取消
                    </button>
                    <button id="input-ok" class="flex-1 py-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-medium shadow-lg shadow-orange-200 hover:shadow-xl transition-all">
                        确认
                    </button>
                </div>
            </div>
        </div>

        <!-- Emoji Picker 模态框 -->
        <div id="emoji-picker-modal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="emoji-picker-backdrop"></div>
            <div class="absolute inset-x-4 top-[10%] md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[420px] bg-white rounded-3xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0" id="emoji-picker-content">
                <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-orange-50 to-amber-50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-amber-500 rounded-xl flex items-center justify-center">
                            <span class="text-xl">😊</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800">选择图标</h3>
                            <p class="text-xs text-gray-500">点击选择 Emoji 图标</p>
                        </div>
                    </div>
                    <button id="close-emoji-picker" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-6">
                    <!-- 自定义输入 -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">自定义图标</label>
                        <input type="text" id="custom-emoji" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all text-center text-xl" placeholder="输入 Emoji...">
                    </div>
                    <!-- 最近使用 -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">最近使用</label>
                        <div id="recent-emojis" class="flex flex-wrap gap-2 min-h-[40px] p-2 bg-gray-50 rounded-xl">
                            <span class="text-gray-400 text-sm">无最近使用</span>
                        </div>
                    </div>
                    <!-- 分类选择 -->
                    <div class="mb-4">
                        <div id="emoji-categories" class="flex gap-2 overflow-x-auto pb-2">
                            <!-- Categories populated by JS -->
                        </div>
                    </div>
                    <!-- 搜索 -->
                    <div class="mb-4">
                        <input type="text" id="emoji-search" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all" placeholder="搜索 Emoji...">
                    </div>
                    <!-- Emoji 网格 -->
                    <div id="emoji-grid" class="grid grid-cols-8 gap-2 max-h-[240px] overflow-y-auto">
                        <!-- Emoji grid populated by JS -->
                    </div>
                </div>
                <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center gap-3">
                    <button id="emoji-cancel" class="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-all">
                        取消
                    </button>
                    <button id="emoji-confirm" class="flex-1 py-2.5 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-medium shadow-lg shadow-orange-200 hover:shadow-xl transition-all">
                        确认
                    </button>
                </div>
            </div>
        </div>

        <!-- AI 加载动画 -->
        <div id="ai-loading" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
                <div class="relative w-32 h-32 mx-auto mb-6">
                    <!-- 旋转光环 -->
                    <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-orange-400 border-r-amber-400 animate-spin" style="animation-duration: 1.5s;"></div>
                    <div class="absolute inset-2 rounded-full border-4 border-transparent border-b-orange-300 border-l-amber-300 animate-spin" style="animation-duration: 2s; animation-direction: reverse;"></div>
                    <!-- 中心图标 -->
                    <div class="absolute inset-4 bg-white rounded-full flex items-center justify-center shadow-lg">
                        <span class="text-4xl animate-pulse">💡</span>
                    </div>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">AI 正在识别中...</h3>
                <p id="ai-loading-text" class="text-white/70 text-sm">正在分析图片内容</p>
            </div>
        </div>
    </div>

    <!-- JavaScript 文件 -->
    <script src="js/app.js"></script>
    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();
    </script>
</body>
</html>
